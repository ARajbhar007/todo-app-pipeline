<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App - DevOps Pipeline</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 Todo App</h1>
      <p class="subtitle">Production-Grade DevOps Application</p>
    </header>

    <main>
      <section class="add-todo">
        <form id="todoForm">
          <input 
            type="text" 
            id="todoTitle" 
            placeholder="What needs to be done?" 
            required
            autocomplete="off"
          >
          <input 
            type="text" 
            id="todoDescription" 
            placeholder="Description (optional)"
            autocomplete="off"
          >
          <button type="submit" class="btn btn-primary">Add Todo</button>
        </form>
      </section>

      <section class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
        <button class="btn btn-danger" id="clearCompleted">Clear Completed</button>
      </section>

      <section class="todo-list">
        <ul id="todoList"></ul>
      </section>

      <section class="stats">
        <p><span id="totalCount">0</span> total | <span id="activeCount">0</span> active | <span id="completedCount">0</span> completed</p>
      </section>
    </main>

    <footer>
      <p>Health: <span id="healthStatus">Checking...</span></p>
      <p>Pod: <span id="hostname">-</span></p>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
