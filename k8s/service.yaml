# NodePort Service for EKS
apiVersion: v1
kind: Service
metadata:
  name: todo-app-service
  namespace: todo-app
  labels:
    app: todo-app
  annotations:
    # For AWS ALB Ingress Controller (if using)
    alb.ingress.kubernetes.io/healthcheck-path: /api/health/ready
spec:
  type: NodePort
  selector:
    app: todo-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080
---
